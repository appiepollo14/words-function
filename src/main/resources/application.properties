quarkus.azure-functions.app-name=words-function-1773433596394
quarkus.azure-functions.region=germanywestcentral
quarkus.azure-functions.subscription-id=5ac526de-f44c-475f-8181-59acd5700580
quarkus.azure-functions.runtime.java-version=21

# Local/dev/test default datasource so Hibernate can boot without Dev Services.
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:words;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Production database defaults to SQL Server and can be overridden by env vars.
%prod.quarkus.datasource.db-kind=mssql
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
