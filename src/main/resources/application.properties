# Local/dev/test default datasource so Hibernate can boot without Dev Services.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:words;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Azure deployment settings are only needed for production packaging/deploy.
%prod.quarkus.azure-functions.app-name=${AZURE_FUNCTION_APP_NAME:words-function}
%prod.quarkus.azure-functions.region=${AZURE_FUNCTION_REGION:germanywestcentral}
%prod.quarkus.azure-functions.subscription-id=${AZURE_SUBSCRIPTION_ID:}
%prod.quarkus.azure-functions.runtime.java-version=21

# Production database defaults to SQL Server and can be overridden by env vars.
%prod.quarkus.datasource.db-kind=mssql
%prod.quarkus.datasource.username=${DB_USERNAME:}
%prod.quarkus.datasource.password=${DB_PASSWORD:}
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:sqlserver://localhost:1433;databaseName=words}
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
